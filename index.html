<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESP32 Smart Relay Dashboard</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#111827;
      --card:#1e293b;
      --line:rgba(255,255,255,0.08);
      --txt:#e5e7eb;
      --muted:#94a3b8;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#3b82f6;
      --cyan:#06b6d4;
      --yellow:#f59e0b;
      --shadow:0 10px 28px rgba(0,0,0,.28);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,Segoe UI,Tahoma,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(6,182,212,.12), transparent 25%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--txt);
      min-height:100vh;
    }

    .container{
      width:min(900px,94%);
      margin:18px auto;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-bottom:16px;
      padding:18px 20px;
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      box-shadow:var(--shadow);
    }

    .hero h1{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:.3px;
    }

    .maker{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      font-weight:700;
      font-size:14px;
      white-space:nowrap;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 10px var(--red);
    }

    .dot.connected{
      background:var(--green);
      box-shadow:0 0 10px var(--green);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:14px;
    }

    .card{
      grid-column:span 4;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      min-height:110px;
    }

    .card.wide{ grid-column:span 6; }
    .card.full{ grid-column:span 12; }

    .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
      letter-spacing:.4px;
      text-transform:uppercase;
    }

    .value{
      font-size:28px;
      font-weight:800;
      margin:0;
      line-height:1.2;
    }

    .value.small{ font-size:22px; }

    .ok{color:var(--green)}
    .bad{color:var(--red)}
    .warn{color:var(--yellow)}
    .info{color:#7dd3fc}

    .switch-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-top:12px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 70px;
      height: 38px;
      flex-shrink:0;
    }

    .switch input { display:none; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #334155;
      transition: .3s;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.08);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 28px;
      width: 28px;
      left: 5px;
      top: 4px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background: linear-gradient(90deg,#16a34a,#22c55e);
    }

    input:checked + .slider:before {
      transform: translateX(31px);
    }

    .range-wrap{
      margin-top:14px;
    }

    input[type="range"]{
      width:100%;
      appearance:none;
      height:9px;
      border-radius:999px;
      outline:none;
      background:linear-gradient(90deg,#06b6d4,#3b82f6);
    }

    input[type="range"]::-webkit-slider-thumb{
      appearance:none;
      width:22px;
      height:22px;
      border-radius:50%;
      background:#fff;
      cursor:pointer;
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }

    .delay-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:12px;
      color:var(--muted);
      font-size:14px;
    }

    .relay-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    @media (max-width: 900px){
      .card,.card.wide,.card.full{grid-column:span 12}
      .hero{flex-direction:column;align-items:flex-start}
      .container{width:min(680px,94%)}
    }

    @media (max-width: 560px){
      .container{width:94%; margin:12px auto;}
      .hero{padding:16px}
      .hero h1{font-size:20px}
      .card{padding:16px; min-height:auto}
      .value{font-size:24px}
      .value.small{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div>
        <h1>ESP32 Smart Relay Dashboard</h1>
        <div class="maker">Made by Omid Golchin</div>
      </div>
      <div class="status-pill">
        <span id="wsDot" class="dot"></span>
        <span id="wsStatus">WebSocket: Connecting...</span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Device Status</div>
        <div id="deviceStatus" class="value small warn">WAITING</div>
      </div>

      <div class="card">
        <div class="label">Current Time</div>
        <div id="timeValue" class="value info">--:--:--</div>
      </div>

      <div class="card">
        <div class="label">Alarm Status</div>
        <div id="alarmValue" class="value warn">--</div>
      </div>

      <div class="card wide">
        <div class="label">Relay GPIO2</div>
        <div class="relay-top">
          <div id="relay2State" class="value small warn">Relay is OFF</div>
          <label class="switch">
            <input type="checkbox" id="relay2Toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="card wide">
        <div class="label">Relay GPIO4 Delay</div>
        <div id="relay4State" class="value small warn">Relay is OFF</div>

        <div class="range-wrap">
          <input type="range" id="delaySlider" min="0.1" max="60" step="0.1" value="60">
        </div>

        <div class="delay-meta">
          <span>Delay (seconds)</span>
          <strong id="delayValue">60.0 s</strong>
        </div>
      </div>

      <div class="card full">
        <div class="label">DC Bus Voltage</div>
        <div id="dcbusValue" class="value">0.0 V</div>
      </div>
    </div>
  </div>

  <script>
    const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${wsProtocol}://${location.host}`);

    const wsStatus = document.getElementById("wsStatus");
    const wsDot = document.getElementById("wsDot");

    const deviceStatus = document.getElementById("deviceStatus");
    const timeValue = document.getElementById("timeValue");
    const alarmValue = document.getElementById("alarmValue");

    const relay2Toggle = document.getElementById("relay2Toggle");
    const relay2State = document.getElementById("relay2State");
    const relay4State = document.getElementById("relay4State");

    const delaySlider = document.getElementById("delaySlider");
    const delayValue = document.getElementById("delayValue");

    const dcbusValue = document.getElementById("dcbusValue");

    function setWsConnected(ok) {
      wsStatus.textContent = ok ? "WebSocket: Connected" : "WebSocket: Disconnected";
      wsDot.classList.toggle("connected", ok);
    }

    ws.onopen = () => {
      setWsConnected(true);
      ws.send(JSON.stringify({ cmd: "snapshot" }));
    };

    ws.onclose = () => {
      setWsConnected(false);
    };

    ws.onerror = () => {
      setWsConnected(false);
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === "device") {
        deviceStatus.textContent = msg.value || "--";
        deviceStatus.className = "value small ok";
      }

      else if (msg.type === "time") {
        timeValue.textContent = msg.value || "--:--:--";
      }

      else if (msg.type === "alarm") {
        if (msg.value === "INTRUDER") {
          alarmValue.textContent = "INTRUDER";
          alarmValue.className = "value bad";
        } else {
          alarmValue.textContent = "CLEAR";
          alarmValue.className = "value ok";
        }
      }

      else if (msg.type === "relay") {
        if (msg.name === "relay_gpio2") {
          const isOn = msg.value === "ON";
          relay2State.textContent = isOn ? "Relay is ON" : "Relay is OFF";
          relay2State.className = "value small " + (isOn ? "ok" : "warn");
          relay2Toggle.checked = isOn;
        }

        if (msg.name === "relay_gpio4") {
          const isOn = msg.value === "ON";
          relay4State.textContent = isOn ? "Relay is ON" : "Relay is OFF";
          relay4State.className = "value small " + (isOn ? "ok" : "warn");
        }
      }

      else if (msg.type === "delay") {
        const val = Number(msg.value).toFixed(1);
        delayValue.textContent = `${val} s`;
        delaySlider.value = val;
      }

      else if (msg.type === "dcbus") {
        dcbusValue.textContent = `${Number(msg.value).toFixed(1)} V`;
      }
    };

    relay2Toggle.addEventListener("change", () => {
      const value = relay2Toggle.checked ? "ON" : "OFF";
      ws.send(JSON.stringify({
        cmd: "relay_gpio2",
        value
      }));
    });

    delaySlider.addEventListener("input", () => {
      delayValue.textContent = `${Number(delaySlider.value).toFixed(1)} s`;
    });

    delaySlider.addEventListener("change", () => {
      ws.send(JSON.stringify({
        cmd: "delay_gpio4",
        value: Number(delaySlider.value)
      }));
    });
  </script>
</body>
</html>
